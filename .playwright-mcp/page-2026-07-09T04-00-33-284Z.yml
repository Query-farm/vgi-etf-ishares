                  - paragraph [ref=e694]:
                    - text: "Source: Lipper, Bloomberg, as of June 30, 2025. Total expense ratio of 0.20% represented for RSP. Lipper Multi-Cap Core Funds Classification median expense ratio is based on open-end, no-load mutual funds and ETFs; excludes funds of funds. An investment cannot be made directly into an index. ETFs generally have lower expenses than actively managed mutual funds due to their different management styles. Most ETFs are passively managed and are structured to track an index, whereas many mutual funds are actively managed and thus have higher management fees. Unlike ETFs, actively managed mutual funds have the ability to react to market changes and the potential to outperform a stated benchmark. ETFs can be traded throughout the day, whereas mutual funds are traded only once a day. While extreme market conditions could result in illiquidity for ETFs, typically they are still more liquid than most mutual funds because they trade on exchanges. While it is not Invesco’s intention, there is no guarantee that the Funds will not distribute capital gains to its shareholders. Capital gains source: Lipper, Bloomberg, as of June 30, 2025. Lipper Multi-Cap Core Funds Classification average annualized capital gains rate (%NAV) are based on open end, no-load mutual funds and ETFs; excludes funds of funds."
