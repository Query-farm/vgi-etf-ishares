        - heading "Overview" [level=2] [ref=e121]
        - generic [ref=e124]:
          - heading "Product details" [level=3] [ref=e126]
          - generic [ref=e129]:
            - paragraph [ref=e130]: Invesco S&P 500® Equal Weight ETF (RSP) is based on the S&P 500® Equal Weight Index (Index). The Fund will invest at least 90% of its total assets in securities that comprise the Index.
            - list [ref=e131]:
              - listitem [ref=e132]: The Index equally weights the stocks in the S&P 500® Index.
              - listitem [ref=e133]: This approach results in an exposure that tilts toward smaller companies in the S&P 500 Index.
              - listitem [ref=e134]: Relative to market cap indexes like the S&P 500, this reduces the concentration risk.
              - listitem [ref=e135]: RSP and the Index are rebalanced quarterly.
        - generic [ref=e145]:
          - generic [ref=e148]:
            - heading "Why invest in RSP?" [level=3] [ref=e149]
            - paragraph [ref=e151]: "Over twenty years ago, the Invesco S&P 500 Equal Weight ETF (ticker: RSP) helped reinvent how clients access the S&P 500. If you're invested in funds that track the S&P 500 Index, your portfolio may be too concentrated and missing out on potentially higher returns. RSP can help address both concerns with the added potential benefits of cost-effectiveness and tax efficiency."
          - generic [ref=e152]:
            - generic [ref=e154]:
              - generic [ref=e155]:
                - img "define" [ref=e157]
                - heading "Reduce concentration risk" [level=4] [ref=e158]
              - paragraph [ref=e160]: The fund’s equal weight approach has the potential to mitigate the concentration risk of the market-cap-weighted S&P 500 Index.
            - generic [ref=e162]:
              - generic [ref=e163]:
                - img "Size" [ref=e165]
                - heading "Complement large-cap exposure" [level=4] [ref=e166]
              - paragraph [ref=e168]: RSP’s equal weight methodology provides greater exposure to smaller companies in the S&P 500 Index, leveraging the size and value factors.
            - generic [ref=e170]:
              - generic [ref=e171]:
                - img "Decide" [ref=e173]
                - heading "Access at an attractive cost with tax efficiency" [level=4] [ref=e174]
              - paragraph [ref=e176]:
                - text: RSP has among the lowest expense ratio versus its peers and has not paid capital gains distributions since inception.
