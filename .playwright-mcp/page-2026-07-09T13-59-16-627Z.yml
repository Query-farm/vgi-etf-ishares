          - region "disclaimer" [ref=e139]:
            - paragraph [ref=e140]: This website is a general communication being provided for informational purposes only. It is educational in nature and not designed to be a recommendation for any specific investment product, strategy, plan feature or other purposes. By receiving this communication you agree with the intended purpose described above. Any examples used in this material are generic, hypothetical and for illustration purposes only. None of J.P. Morgan Asset Management, its affiliates or representatives is suggesting that the recipient or any other person take a specific course of action or any action at all. Communications such as this are not impartial and are provided in connection with the advertising and marketing of products and services. Prior to making any investment or financial decisions, an investor should seek individualized advice from personal financial, legal, tax and other professionals that take into account all of the particular facts and circumstances of an investor's own situation.
            - paragraph [ref=e141]
            - paragraph [ref=e142]: Variable annuity guarantees are only as good as the insurance company that gives them. While it is an uncommon occurrence that the insurance companies that back these guarantees are unable to meet their obligations, it may happen. Annuity withdrawals prior to 59½ may be subject to tax penalties, are subject to market risk and may lose value. Riders have additional fees and costs associated with them, and are subject to additional conditions, restrictions, and limitations.
