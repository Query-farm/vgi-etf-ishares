            - paragraph [ref=e429]: "Source: Lipper fund percentile rankings are based on total returns, excluding sales charges and including fees and expenses, and are versus mutual funds, ETFs and funds of funds in the category tracked by Lipper. Source: The Lipper one-year rank 11% (75 of 708), five-year rank 5% (29 of 610), 10-year rank 3% (13 of 508), 15-year rank 1% (3 of 396) as of March 31, 2026."
            - paragraph [ref=e430]: Morningstar ratings are based on a risk-adjusted return measure that accounts for variation in a fund’s monthly performance, placing more emphasis on the downward variations and rewarding consistent performance. Open-end mutual funds and exchange-traded funds are considered a single population for comparison purposes. Ratings are calculated for funds with at least a three year history. The overall rating is derived from a weighted average of three-, five- and 10-year rating metrics, as applicable, excluding sales charges and including fees and expenses. Had fees not been waived and/or expenses reimbursed currently or in the past, the Morningstar rating would have been lower. The fund received 5 stars for the overall, 5 stars for the three years, 5 stars for the five years and 5 stars for the 10 years. As of March 31, 2026, the fund had an overall rating of 5 Stars out of 1103 funds, 4 Stars out of 1034 funds for the 3-year period, 5 Stars out of 985 funds for the 5-year period and 5 Stars out of 898 funds for the 10-year period, respectively, in the Large Growth category. The top 10% of funds in a category receive five stars, the next 22.5% four stars, the next 35% three stars, the next 22.5% two stars and the bottom 10% one star. Ratings for other share classes may differ due to different performance characteristics. ©2026 Morningstar, Inc. All rights reserved. The information contained herein is proprietary to Morningstar and/or its content providers. It may not be copied or distributed and is not warranted to be accurate, complete or timely. Neither Morningstar nor its content providers are responsible for any damages or losses arising from any use of this information. Past performance cannot guarantee comparable future results.
